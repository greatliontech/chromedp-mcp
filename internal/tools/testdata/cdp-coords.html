<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CDP Coordinate Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 4000px; height: 5000px; }

        /* Element at a known position near top of page */
        #top-box {
            position: absolute;
            top: 50px; left: 50px;
            width: 100px; height: 80px;
            background: #4CAF50;
        }

        /* Element far below the fold — requires scrolling */
        #bottom-box {
            position: absolute;
            top: 3000px; left: 200px;
            width: 150px; height: 100px;
            background: #2196F3;
        }

        /* Element far to the right — requires horizontal scrolling */
        #right-box {
            position: absolute;
            top: 100px; left: 3500px;
            width: 120px; height: 60px;
            background: #FF9800;
        }

        /* Distinct colored box for screenshot verification */
        #screenshot-target {
            position: absolute;
            top: 2500px; left: 100px;
            width: 200px; height: 200px;
            background: #FF0000;
        }
    </style>
</head>
<body>
    <div id="top-box">T</div>
    <div id="bottom-box">B</div>
    <div id="right-box">R</div>
    <div id="screenshot-target">S</div>

    <!-- Outputs for coordinate verification -->
    <div id="hover-output" style="position:fixed;top:0;right:0;font-size:12px;z-index:9999;"></div>
    <div id="click-output" style="position:fixed;top:20px;right:0;font-size:12px;z-index:9999;"></div>
    <div id="right-click-output" style="position:fixed;top:40px;right:0;font-size:12px;z-index:9999;"></div>

    <script>
        // Record hover coordinates on each target element.
        ['top-box', 'bottom-box', 'right-box'].forEach(function(id) {
            document.getElementById(id).addEventListener('mousemove', function(e) {
                document.getElementById('hover-output').textContent =
                    id + ':' + Math.round(e.clientX) + ',' + Math.round(e.clientY);
            });
        });

        // Record click coordinates.
        ['top-box', 'bottom-box', 'right-box'].forEach(function(id) {
            document.getElementById(id).addEventListener('click', function(e) {
                document.getElementById('click-output').textContent =
                    id + ':' + Math.round(e.clientX) + ',' + Math.round(e.clientY);
            });
        });

        // Record right-click (contextmenu) coordinates.
        ['top-box', 'bottom-box', 'right-box'].forEach(function(id) {
            document.getElementById(id).addEventListener('mousedown', function(e) {
                if (e.button === 2) {
                    document.getElementById('right-click-output').textContent =
                        id + ':' + Math.round(e.clientX) + ',' + Math.round(e.clientY);
                }
            });
        });
    </script>
</body>
</html>
