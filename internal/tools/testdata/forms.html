<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Test</title>
</head>
<body>
    <h1>Form Test</h1>
    <form id="test-form" action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="">

        <label for="color">Favorite Color:</label>
        <select id="color" name="color">
            <option value="red">Red</option>
            <option value="green">Green</option>
            <option value="blue">Blue</option>
        </select>

        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea>

        <input type="file" id="file-input" name="file">

        <button type="submit" id="submit-btn">Submit</button>
    </form>

    <div id="result" style="display:none;"></div>
    <div id="change-output"></div>

    <script>
        document.getElementById('test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            var result = document.getElementById('result');
            result.style.display = 'block';
            result.textContent = 'Form submitted: ' + new FormData(this).get('name');
        });

        // Track change events on the select.
        document.getElementById('color').addEventListener('change', function() {
            document.getElementById('change-output').textContent = 'changed:' + this.value;
        });
    </script>
</body>
</html>
