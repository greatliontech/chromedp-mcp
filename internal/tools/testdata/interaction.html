<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interaction Test</title>
    <style>
        #click-target { width: 200px; height: 50px; background: #eee; cursor: pointer; text-align: center; line-height: 50px; }
        #click-target.clicked { background: #4CAF50; color: white; }
        #hover-target { width: 200px; height: 50px; background: #eee; text-align: center; line-height: 50px; margin-top: 10px; }
        #hover-target.hovered { background: #2196F3; color: white; }
        #scroll-marker { margin-top: 2000px; }
        #key-output { margin-top: 10px; padding: 10px; background: #f0f0f0; min-height: 20px; }
    </style>
</head>
<body>
    <h1>Interaction Test</h1>

    <div id="click-target">Click me</div>
    <div id="click-count">0</div>

    <div id="hover-target">Hover me</div>

    <input type="text" id="type-target" placeholder="Type here">

    <div id="key-output"></div>

    <div id="scroll-marker">You scrolled here!</div>

    <div id="middle-click-output"></div>
    <div id="triple-click-output"></div>
    <div id="scroll-x-target" style="width: 3000px; height: 10px; background: #ddd;"></div>

    <script>
        var clicks = 0;
        document.getElementById('click-target').addEventListener('click', function() {
            clicks++;
            this.classList.add('clicked');
            this.textContent = 'Clicked!';
            document.getElementById('click-count').textContent = String(clicks);
        });

        // Middle-click detection via mousedown.
        document.getElementById('click-target').addEventListener('mousedown', function(e) {
            if (e.button === 1) {
                document.getElementById('middle-click-output').textContent = 'middle-click';
            }
        });

        // Triple-click detection.
        document.getElementById('click-target').addEventListener('click', function(e) {
            if (e.detail === 3) {
                document.getElementById('triple-click-output').textContent = 'triple-click';
            }
        });

        document.getElementById('hover-target').addEventListener('mouseover', function() {
            this.classList.add('hovered');
            this.textContent = 'Hovered!';
        });

        document.getElementById('hover-target').addEventListener('mouseout', function() {
            document.getElementById('hover-target').dataset.mouseout = 'true';
        });

        document.addEventListener('keydown', function(e) {
            var parts = [e.key];
            if (e.ctrlKey) parts.push('Ctrl');
            if (e.shiftKey) parts.push('Shift');
            if (e.altKey) parts.push('Alt');
            if (e.metaKey) parts.push('Meta');
            document.getElementById('key-output').textContent = parts.join('+');
        });
    </script>
</body>
</html>
